name: Continuous Integration

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: write
      pull-requests: write
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /github/workspace

      - name: Run a one-line script
        run: echo "Foundation Pipeline Success"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Confirmation message
        run: node -v

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: "./backend"

      - name: Run Backend Linter
        run: npm run lint-ci
        working-directory: "./backend"
        continue-on-error: true

      - name: Run Backend Tests
        run: npm test -- --coverage --reporters=default --reporters=jest-junit --coverageReporters="text" --coverageReporters="cobertura" --coverageReporters="lcov"
        working-directory: "./backend"
        continue-on-error: true
        env:
          JEST_JUNIT_OUTPUT_DIR: "."
          JEST_JUNIT_OUTPUT_NAME: "junit.xml"

      - name: Report Test Results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Jest Tests
          path: backend/junit.xml
          reporter: jest-junit
          use-actions-summary: 'false'

      - name: Report Code Coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          output: both

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: "./frontend"

      - name: Run Frontend Linter
        run: npm run lint-ci
        working-directory: "./frontend"
        continue-on-error: true

      - name: Transform Backend Lint Report
        uses: MeilCli/common-lint-reporter/transformer/eslint@v2.0.5
        with:
          report_files: backend/eslint-report.json
          output_path: eslint_backend.json

      - name: Transform Frontend Lint Report
        uses: MeilCli/common-lint-reporter/transformer/eslint@v2.0.5
        with:
          report_files: frontend/eslint-report.json
          output_path: eslint_frontend.json

      - name: Upload Lint Report
        uses: MeilCli/common-lint-reporter@v2.0.5
        with:
          report_type: "check_run"
          report_name: "Lint Report"
          report_files: "*eslint_*.json"

      - name: Build Frontend
        run: npm run build
        working-directory: "./frontend"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-backend:latest \
            ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-frontend:latest \
            ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_USERNAME }}-thinkboard-frontend:latest

      - name: Docker Logout
        run: docker logout
