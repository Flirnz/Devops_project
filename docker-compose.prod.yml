services:
  mongodb: 
    image: mongo:6.0
    container_name: thinkboard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - thinkboard-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  
  backend:
    image: ${DOCKER_USERNAME}/${DOCKER_USERNAME}-thinkboard-backend:${IMAGE_TAG}
    container_name: thinkboard-backend
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/thinkboard
      - PORT=5001
      - NODE_ENV=production
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - thinkboard-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  
  frontend:
    image: ${DOCKER_USERNAME}/${DOCKER_USERNAME}-thinkboard-frontend:${IMAGE_TAG}
    container_name: thinkboard-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - thinkboard-network

volumes:
  mongo_data:

networks:
  thinkboard-network:
    driver: bridge
